baseURL: https://example.org/ # TODO: Update this to the actual URL of the website once it's deployed.
locale: en-us
title: FAIR Lab @ USAFA
theme: ["PaperMod"]

# Adds buttons to the menu bar up top. 
#   "Identifier" is used for internal linking: "about" leads to content/about.md, "faculty" leads to content/faculty/.
#   "Name" is the text that appears in the menu bar.
#   "URL" is the URL path that the button links to. By convention, this should be the same as the identifier, but it 
#     doesn't have to be.
#   "Weight" controls the order of the buttons. Lower weights appear first. Convention is to use increments of 10 to 
#     allow for easy insertion of new buttons later.
menu:
  main:
    - identifier: about
      name: About
      url: /about/
      weight: 10
    - identifier: faculty
      name: Faculty
      url: /faculty/
      weight: 20
    - identifier: research
      name: Research
      url: /research/
      weight: 30
    - identifier: reviews
      name: AI Tool Reviews
      url: /reviews/
      weight: 40
    - identifier: help
      name: Request Help
      url: /help/
      weight: 50
    - identifier: publications
      name: Publications
      url: /publications/
      weight: 60

params:
  # Controls the home page
  profileMode:
    enabled: true
    title: FAIR Lab @ USAFA
    subtitle: Falcon AI Research Lab
    imageUrl: '/images/AF-logo-Blue-Bkgd.png'
    imageWidth: 400
    imageHeight: 200
    buttons:
      - name: "Meet the Faculty"
        url: "/faculty/"
      - name: "Request Help with AI"
        url: "/help/"
      - name: "Read Reviews on AI Tools"
        url: "/reviews/"
  defaultTheme: auto


